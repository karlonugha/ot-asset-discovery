services:
  - type: web
    name: ot-asset-discovery-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ot-asset-discovery-db
          property: connectionURI
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://ot-asset-discovery.vercel.app
      - key: APP_PORT
        value: "8000"
    healthCheckPath: /health

databases:
  - name: ot-asset-discovery-db
    plan: free
    databaseName: ot_asset_discovery
    postgresMajorVersion: "16"
